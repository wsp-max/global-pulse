name: Analyze Topics (Gemini Summaries)

on:
  schedule:
    - cron: "15 */8 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Execute job
        run: npx tsx packages/analyzer/src/run-analysis.ts --with-gemini
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Report status
        if: failure()
        run: echo "::warning::Analyze Topics (Gemini Summaries) failed"

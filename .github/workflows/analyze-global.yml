name: Analyze Global Cross-Region Topics

on:
  schedule:
    - cron: '15 */3 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Execute job
        run: npx tsx packages/analyzer/src/run-global-analysis.ts --hours 24 --min-regions 2 --similarity 0.3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Report status
        if: failure()
        run: echo "::warning::Analyze Global Cross-Region Topics failed"



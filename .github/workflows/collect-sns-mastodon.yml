name: Collect Mastodon Signals

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Execute job
        run: npx tsx packages/collector/src/run.ts --source mastodon_kr,mastodon_jp,mastodon_tw,mastodon_cn,mastodon_us,mastodon_eu,mastodon_me,mastodon_ru
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_MAX_INSTANCES: '30'
          MASTODON_POSTS_PER_INSTANCE: '210'
          MASTODON_SOURCE_POST_CAP: '210'
          MASTODON_KR_INSTANCES: ${{ secrets.MASTODON_KR_INSTANCES }}
          MASTODON_JP_INSTANCES: ${{ secrets.MASTODON_JP_INSTANCES }}
          MASTODON_TW_INSTANCES: ${{ secrets.MASTODON_TW_INSTANCES }}
          MASTODON_CN_INSTANCES: ${{ secrets.MASTODON_CN_INSTANCES }}
          MASTODON_US_INSTANCES: ${{ secrets.MASTODON_US_INSTANCES }}
          MASTODON_EU_INSTANCES: ${{ secrets.MASTODON_EU_INSTANCES }}
          MASTODON_ME_INSTANCES: ${{ secrets.MASTODON_ME_INSTANCES }}
          MASTODON_RU_INSTANCES: ${{ secrets.MASTODON_RU_INSTANCES }}

      - name: Report status
        if: failure()
        run: echo "::warning::Collect Mastodon Signals failed"



